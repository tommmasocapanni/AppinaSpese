<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wallet">
<title>Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--card:#16161f;--card2:#1c1c28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f5;--muted:#6b6b80;--muted2:#9090a8;
  --accent:#6366f1;--accent2:#818cf8;
  --green:#10b981;--green-dim:rgba(16,185,129,0.15);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.15);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);
  --r:14px;--r-lg:20px;--r-xl:26px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg)}
body{font-family:'Sora',sans-serif;color:var(--text);background:var(--bg);max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HERO */
.hero{padding:58px 24px 22px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(99,102,241,0.18) 0%,transparent 65%);pointer-events:none}
.hero-label{font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-size:52px;font-weight:700;letter-spacing:-2.5px;line-height:1;background:linear-gradient(140deg,#fff 30%,#6b7db3 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:13px;color:var(--muted);margin-top:6px}
.chips{display:flex;gap:7px;margin-top:16px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600}
.chip-g{background:var(--green-dim);color:var(--green)}
.chip-a{background:var(--amber-dim);color:var(--amber)}
.chip-r{background:var(--red-dim);color:var(--red)}
.chip-b{background:var(--blue-dim);color:#60a5fa}
.chip-v{background:rgba(99,102,241,0.15);color:var(--accent2)}

/* BOTTOM TAB BAR */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  display:flex;align-items:stretch;
  background:rgba(13,13,20,0.96);
  border-top:1px solid var(--border2);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 11px;gap:4px;
  border:none;background:none;cursor:pointer;
  color:var(--muted);transition:color .18s;
  font-family:'Sora',sans-serif;
}
.tab-btn.active{color:var(--accent2)}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8;transition:transform .15s}
.tab-btn.active svg{transform:scale(1.1)}
.tab-btn span{font-size:10px;font-weight:600;letter-spacing:0.3px}
.tab-btn-center{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px 11px;gap:4px;border:none;background:none;cursor:pointer;
}
.tab-center-ico{
  width:44px;height:44px;background:var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(99,102,241,0.5);
  transition:transform .15s;margin-top:-18px;
}
.tab-btn-center:active .tab-center-ico{transform:scale(.92)}

/* CONTENT */
.content{flex:1;padding:18px 16px 90px;display:flex;flex-direction:column;gap:10px}
.section{display:none;flex-direction:column;gap:10px}
.section.active{display:flex}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:0 2px;margin-top:4px}

/* CARD */
.card{background:var(--card);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.card-body{padding:16px 18px}

/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.mlabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mval{font-size:24px;font-weight:700;letter-spacing:-0.5px}
.mval.g{color:var(--green)}.mval.a{color:var(--amber)}.mval.r{color:var(--red)}.mval.w{color:var(--text)}

/* TX ROW */
.tx-list{display:flex;flex-direction:column}
.tx{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx:last-child{border-bottom:none;padding-bottom:0}
.tx:first-child{padding-top:0}
.tx-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--muted);margin-top:1px}
.tx-amt{font-size:15px;font-weight:700;color:var(--red);flex-shrink:0}
.tx-amt.income{color:var(--green)}
.del-btn{width:28px;height:28px;border-radius:9px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:'Sora',sans-serif}
.del-btn:active{background:var(--red-dim);color:var(--red);border-color:rgba(239,68,68,0.4)}
.edit-btn{width:28px;height:28px;border-radius:9px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Sora',sans-serif}

/* BARS */
.bbar{margin-bottom:14px}.bbar:last-child{margin-bottom:0}
.bbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bbar-name{font-size:13px;font-weight:600}
.bbar-nums{font-size:11px;color:var(--muted)}
.bar{height:4px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* FORM */
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:7px}
input[type=text],input[type=number],input[type=date],input[type=month],select,textarea{
  width:100%;padding:12px 15px;border:1px solid var(--border2);border-radius:var(--r);
  font-size:15px;font-family:'Sora',sans-serif;background:var(--card2);color:var(--text);
  outline:none;transition:border .2s;-webkit-appearance:none;appearance:none;
}
input::placeholder,textarea::placeholder{color:var(--muted)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:#1c1c28}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Sora',sans-serif;transition:all .15s}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:active{opacity:.85;transform:scale(.98)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted2);border:1px solid var(--border)}
.btn-ghost:active{background:rgba(255,255,255,0.09)}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:10px;width:auto;white-space:nowrap}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}

/* ALERTS */
.alert-row{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.alert-row.warn{background:var(--amber-dim);color:var(--amber)}
.alert-row.danger{background:var(--red-dim);color:var(--red)}
.alert-row.info{background:var(--blue-dim);color:#60a5fa}
.alert-row.success{background:var(--green-dim);color:var(--green)}

/* PREVENTIVI */
.prev-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:10px}
.prev-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.prev-name{font-size:16px;font-weight:700}
.prev-sub{font-size:12px;color:var(--muted);margin-top:2px}
.prev-foot{display:flex;justify-content:space-between;font-size:12px;margin-top:10px}
.prev-inc{color:var(--green);font-weight:600}
.prev-rem{color:var(--muted)}
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.pay-row:last-of-type{border-bottom:none}
.pay-note{color:var(--muted2)}
.pay-amt{color:var(--green);font-weight:700}
.incassa-wrap{display:flex;gap:8px;margin-top:12px;align-items:center}
.incassa-wrap input{flex:1;padding:10px 12px;font-size:14px}

/* ABBONAMENTI */
.sub-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px}
.sub-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.sub-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sub-name{font-size:15px;font-weight:700}
.sub-cycle{font-size:12px;color:var(--muted);margin-top:2px}
.sub-right{margin-left:auto;text-align:right}
.sub-amt{font-size:17px;font-weight:700}
.sub-next{font-size:11px;color:var(--muted);margin-top:2px}
.sub-next.soon{color:var(--amber)}
.sub-next.due{color:var(--red)}
.sub-actions{display:flex;gap:8px}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-paid{background:var(--green-dim);color:var(--green)}
.badge-due{background:var(--red-dim);color:var(--red)}
.badge-soon{background:var(--amber-dim);color:var(--amber)}

/* SPLIT */
.split-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px}
.split-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.split-name{font-size:15px;font-weight:700}
.split-tot{font-size:12px;color:var(--muted);margin-top:2px}
.friend-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.friend-row:last-child{border-bottom:none}
.friend-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.friend-name{flex:1;font-size:14px;font-weight:500}
.friend-share{font-size:14px;font-weight:700;color:var(--muted2)}
.friend-paid{font-size:12px;font-weight:600}
.friend-paid.yes{color:var(--green)}
.friend-paid.no{color:var(--red)}
.pay-toggle{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Sora',sans-serif;transition:all .15s}

/* CATEGORIE */
.cat-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-swatch{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cat-name{flex:1;font-size:14px;font-weight:500}
.cat-budget{font-size:13px;color:var(--muted);margin-right:4px}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:26px 26px 0 0;padding:10px 20px 50px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border2)}
.sheet-pill{width:34px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 20px}
.sheet-title{font-size:20px;font-weight:700;margin-bottom:20px}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--card2);border:1px solid var(--border2);border-radius:var(--r-xl);padding:28px 22px 20px;width:100%;max-width:290px;text-align:center}
.confirm-icon{font-size:34px;margin-bottom:10px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:5px}
.confirm-msg{font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:13px;border-radius:13px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Sora',sans-serif}
.c-cancel{background:rgba(255,255,255,0.07);color:var(--text)}
.c-ok{background:var(--red);color:#fff}

/* COLOR PICKER */
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:8px}
.color-opt{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:border .15s}
.color-opt.selected{border-color:#fff}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.emoji-opt{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,0.05)}
.emoji-opt.selected{border-color:var(--accent)}

/* BUDGET SETTINGS */
.bset-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.bset-row:last-child{border-bottom:none}

/* EMPTY */
.empty{text-align:center;padding:32px 0;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:8px}
.empty-txt{font-size:13px}

/* FRIEND TAG */
.friend-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:99px;padding:5px 12px 5px 5px;margin:4px;cursor:pointer;font-size:13px}
.friend-tag-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.friend-tag.selected{border-color:var(--accent);background:rgba(99,102,241,0.12)}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.toggle-label{font-size:14px;font-weight:500}
.toggle{width:44px;height:26px;background:rgba(255,255,255,0.1);border-radius:99px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s}
.toggle.on::after{left:21px}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">Spese questo mese</div>
  <div class="hero-amount" id="hero-amt">€0</div>
  <div class="hero-sub" id="hero-sub">—</div>
  <div class="chips" id="hero-chips"></div>
</div>

<!-- BOTTOM TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-home" onclick="showTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span>Home</span>
  </button>
  <button class="tab-btn" id="tbtn-spese" onclick="showTab('spese')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="7" cy="15" r="1" fill="currentColor"/></svg>
    <span>Spese</span>
  </button>
  <button class="tab-btn-center" onclick="openSheet('new-expense')">
    <div class="tab-center-ico">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </div>
  </button>
  <button class="tab-btn" id="tbtn-entrate" onclick="showTab('entrate')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20M17 7l-5-5-5 5"/><path d="M3 13h18"/></svg>
    <span>Entrate</span>
  </button>
  <button class="tab-btn" id="tbtn-more" onclick="toggleMoreMenu()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
    <span>Altro</span>
  </button>
</div>

<!-- MORE MENU (Budget, Abbonamenti, Split) -->
<div id="more-menu" style="display:none;position:fixed;bottom:72px;right:16px;z-index:49;background:var(--card2);border:1px solid var(--border2);border-radius:18px;overflow:hidden;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.5)">
  <button onclick="showTab('budget');toggleMoreMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Categorie & Budget
  </button>
  <button onclick="showTab('abbonamenti');toggleMoreMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    Abbonamenti
  </button>
  <button onclick="showTab('split');toggleMoreMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:none;border:none;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="7" r="3"/><path d="M3 21v-2a6 6 0 016-6h6a6 6 0 016 6v2"/></svg>
    Split spese
  </button>
</div>

<div class="content">

  <!-- HOME -->
  <div id="tab-home" class="section active">
    <div id="alerts-box" style="display:flex;flex-direction:column;gap:8px"></div>
    <div class="metrics" id="metrics-grid"></div>
    <div class="sec-label">Budget mensile</div>
    <div class="card"><div class="card-body" id="budget-bars"></div></div>
    <div class="sec-label">Ultime transazioni</div>
    <div class="card"><div class="card-body tx-list" id="recent-list"></div></div>
  </div>

  <!-- SPESE -->
  <div id="tab-spese" class="section">
    <div class="card"><div class="card-body tx-list" id="all-list"></div></div>
  </div>

  <!-- BUDGET / CATEGORIE -->
  <div id="tab-budget" class="section">
    <div class="sec-label">Le tue categorie</div>
    <div class="card"><div class="card-body" id="cat-list"></div></div>
    <button class="btn btn-accent" onclick="openSheet('new-cat')">+ Nuova categoria</button>
  </div>

  <!-- ENTRATE -->
  <div id="tab-entrate" class="section">
    <div id="prev-list"></div>
    <div class="sec-label">Nuovo preventivo</div>
    <div class="card">
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Nome lavoro / cliente</label>
          <input type="text" id="p-name" placeholder="es. Sito web cliente X">
        </div>
        <div class="form-group">
          <label class="form-label">Importo preventivato €</label>
          <input type="number" id="p-budget" placeholder="2000">
        </div>
        <button class="btn btn-accent" onclick="addProject()">Crea preventivo</button>
      </div>

  </div>

  <!-- ABBONAMENTI -->
  <div id="tab-abbonamenti" class="section">
    <div id="sub-alerts" style="display:flex;flex-direction:column;gap:8px"></div>
    <div id="sub-list"></div>
    <button class="btn btn-accent" onclick="openSheet('new-sub')">+ Nuovo abbonamento</button>
  </div>

  <!-- SPLIT -->
  <div id="tab-split" class="section">
    <div id="split-summary" class="card" style="display:none">
      <div class="card-body">
        <div class="sec-label" style="margin-top:0">Riepilogo</div>
        <div id="split-summary-body" style="margin-top:10px"></div>
      </div>
    </div>
    <div id="split-list"></div>
    <button class="btn btn-accent" onclick="openSheet('new-split')">+ Nuova spesa condivisa</button>
  </div>

</div>

<!-- SHEETS -->
<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet" id="sheet-inner"></div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title" id="confirm-title">Elimina</div>
    <div class="confirm-msg" id="confirm-msg">Sei sicuro?</div>
    <div class="confirm-btns">
      <button class="c-cancel" onclick="confirmCancel()">Annulla</button>
      <button class="c-ok" onclick="confirmOk()">Elimina</button>
    </div>
  </div>
</div>

<script>
// ─── DEFAULT DATA ───
const DEFAULT_CATS = [
  {id:'cat-cibo',name:'Cibo',emoji:'🍽️',color:'#f97316',budget:400},
  {id:'cat-trasporti',name:'Trasporti',emoji:'🚗',color:'#3b82f6',budget:150},
  {id:'cat-casa',name:'Casa',emoji:'🏠',color:'#10b981',budget:800},
  {id:'cat-svago',name:'Svago',emoji:'🎮',color:'#8b5cf6',budget:200},
  {id:'cat-salute',name:'Salute',emoji:'💊',color:'#ec4899',budget:100},
  {id:'cat-abbigliamento',name:'Abbigliamento',emoji:'👗',color:'#f59e0b',budget:100},
  {id:'cat-altro',name:'Altro',emoji:'📦',color:'#6b7280',budget:150},
];
const PALETTE = ['#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#6366f1','#8b5cf6','#ec4899','#14b8a6','#84cc16','#06b6d4','#f43f5e','#a855f7','#6b7280','#78716c','#0ea5e9'];
const EMOJIS = ['🍽️','🚗','🏠','🎮','💊','👗','📦','☕','🎵','✈️','🏋️','🐶','📚','💻','🛒','🎬','🍕','🍺','💈','⚽','🎯','🏖️','💡','🔧','🎁','🌿','🏥','🚌','🚲','🎨'];
const FRIEND_COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#ec4899','#3b82f6','#8b5cf6','#14b8a6'];
const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let S = { expenses:[], categories:[], projects:[], subscriptions:[], splits:[], friends:[] };

function save(){try{localStorage.setItem('wallet-v4',JSON.stringify(S))}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem('wallet-v4');
    if(d){ S=JSON.parse(d); }
    if(!S.categories||S.categories.length===0) S.categories=[...DEFAULT_CATS.map(c=>({...c}))];
    if(!S.projects) S.projects=[];
    if(!S.subscriptions) S.subscriptions=[];
    if(!S.splits) S.splits=[];
    if(!S.friends) S.friends=[];
  }catch(e){ S.categories=[...DEFAULT_CATS.map(c=>({...c}))]; }
}
load();

// ─── CONFIRM ───
let _cb=null;
function showConfirm(title,msg,cb){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-overlay').classList.add('open');
  _cb=cb;
}
function confirmOk(){document.getElementById('confirm-overlay').classList.remove('open');if(_cb){_cb();_cb=null;}}
function confirmCancel(){document.getElementById('confirm-overlay').classList.remove('open');_cb=null;}

// ─── EVENT DELEGATION ───
document.addEventListener('click',function(e){
  const b=e.target.closest('[data-action]');if(!b)return;
  const id=b.dataset.id; const a=b.dataset.action;
  if(a==='del-exp') deleteExpense(Number(id));
  if(a==='del-proj') deleteProject(Number(id));
  if(a==='del-pay') deletePayment(Number(id));
  if(a==='del-sub') deleteSub(Number(id));
  if(a==='del-split') deleteSplit(Number(id));
  if(a==='del-cat') deleteCat(id);
  if(a==='edit-cat') openSheet('edit-cat',id);
  if(a==='add-pay') addPayment(Number(b.dataset.proj));
  if(a==='mark-sub-paid') markSubPaid(Number(id));
  if(a==='settle-debt') settleDebt(Number(b.dataset.split), b.dataset.id);
  if(a==='edit-sub') openSheet('edit-sub', id);
});

// ─── TABS ───
const TAB_IDS=['home','spese','entrate'];
function showTab(t){
  // Update tab bar active state
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const tid=b.id?b.id.replace('tbtn-',''):null;
    if(tid) b.classList.toggle('active', tid===t);
  });
  // More menu tabs highlight the "..." button
  const moreBtn=document.getElementById('tbtn-more');
  if(moreBtn) moreBtn.classList.toggle('active',['budget','abbonamenti','split'].includes(t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const renders={home:renderHome,spese:renderSpese,budget:renderBudget,entrate:renderEntrate,abbonamenti:renderAbbonamenti,split:renderSplit};
  if(renders[t]) renders[t]();
}

function toggleMoreMenu(){
  const m=document.getElementById('more-menu');
  m.style.display=m.style.display==='none'?'block':'none';
}
// Close more menu on outside click
document.addEventListener('click',function(e){
  const m=document.getElementById('more-menu');
  if(m&&m.style.display!=='none'&&!m.contains(e.target)&&!e.target.closest('.tab-btn')){
    m.style.display='none';
  }
},true);

// ─── HELPERS ───
function monthExp(){
  const n=new Date();
  return S.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});
}
function catById(id){return S.categories.find(c=>c.id===id)||{name:'?',emoji:'📦',color:'#6b7280',budget:0};}
function catTot(catId,list){return list.filter(e=>e.catId===catId).reduce((s,e)=>s+e.amount,0);}
function barClr(p){return p>=100?'#ef4444':p>=80?'#f59e0b':'#10b981';}
function daysUntil(dateStr){
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-today)/(1000*60*60*24));
}
function nextRenewal(sub){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(sub.startDate);
  let next=new Date(start);
  while(next<=today){
    if(sub.cycle==='mensile') next.setMonth(next.getMonth()+1);
    else if(sub.cycle==='annuale') next.setFullYear(next.getFullYear()+1);
    else if(sub.cycle==='settimanale') next.setDate(next.getDate()+7);
    else break;
  }
  return next.toISOString().slice(0,10);
}
function friendColor(name){ let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%FRIEND_COLORS.length; return FRIEND_COLORS[h]; }
function initials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

// ─── HOME ───
function renderHome(){
  try{ _renderHome(); } catch(err){ console.error('renderHome error:',err); }
}
function _renderHome(){
  const me=monthExp();
  const total=me.reduce((s,e)=>s+e.amount,0);
  const budTot=S.categories.reduce((s,c)=>s+(c.budget||0),0);
  const prevTot=S.projects.reduce((s,p)=>s+p.budget,0);
  const incTot=S.projects.reduce((s,p)=>s+(p.payments||[]).reduce((ps,pay)=>ps+pay.amount,0),0);
  const daInc=Math.max(0,prevTot-incTot);
  const rem=budTot-total;
  const subCost=S.subscriptions.reduce((s,sub)=>{
    const c=sub.cycle==='annuale'?sub.amount/12:sub.cycle==='settimanale'?sub.amount*4.33:sub.amount;
    return s+c;
  },0);

  document.getElementById('hero-amt').textContent='€'+total.toFixed(0);
  document.getElementById('hero-sub').textContent=rem>=0?`€${rem.toFixed(0)} di budget rimasto`:'Budget mensile superato';

  let chips='';
  if(incTot>0) chips+=`<span class="chip chip-g">↑ €${incTot.toFixed(0)} incassati</span>`;
  if(daInc>0) chips+=`<span class="chip chip-a">⧖ €${daInc.toFixed(0)} da incassare</span>`;
  if(subCost>0) chips+=`<span class="chip chip-v">↻ €${subCost.toFixed(0)}/mese abbonamenti</span>`;
  if(rem<0) chips+=`<span class="chip chip-r">⚠ Budget superato</span>`;
  document.getElementById('hero-chips').innerHTML=chips;

  // Alerts
  let alerts='';
  S.categories.forEach(cat=>{
    const sp=catTot(cat.id,me),bud=cat.budget||0;if(!bud)return;
    const p=sp/bud;
    if(p>=1) alerts+=`<div class="alert-row danger">⚠ ${cat.name}: budget superato di €${(sp-bud).toFixed(0)}</div>`;
    else if(p>=0.8) alerts+=`<div class="alert-row warn">● ${cat.name}: ${Math.round(p*100)}% del budget usato</div>`;
  });
  // Sub alerts
  S.subscriptions.forEach(sub=>{
    if(!sub.startDate) return;
    try{
      const nr=nextRenewal(sub); const days=daysUntil(nr);
      if(days<=5&&days>=0) alerts+=`<div class="alert-row warn">↻ ${sub.name}: rinnovo tra ${days===0?'oggi':days+' giorni'} (€${sub.amount})</div>`;
      if(days<0) alerts+=`<div class="alert-row danger">↻ ${sub.name}: rinnovo in ritardo!</div>`;
    }catch(e){}
  });
  // Split alerts
  try {
    const {debts:splitDebts}=calcBalances();
    S.splits.forEach(sp=>{
      if(!sp.participants||!sp.payer) return;
      const pending=sp.participants.filter(n=>n!==sp.payer&&((splitDebts[n]&&splitDebts[n][sp.payer])||0)>0.01);
      if(pending.length>0){
        const perPerson=sp.total/sp.participants.length;
        const tot=pending.length*perPerson;
        alerts+=`<div class="alert-row info">👥 ${sp.name}: ${pending.length} ${pending.length===1?'persona deve':'persone devono'} ancora pagare (€${tot.toFixed(0)})</div>`;
      }
    });
  } catch(e){}
  S.projects.forEach(p=>{
    const inc=(p.payments||[]).reduce((s,pay)=>s+pay.amount,0);
    if(inc<p.budget) alerts+=`<div class="alert-row info">◎ ${p.name}: €${(p.budget-inc).toFixed(0)} da incassare</div>`;
  });
  document.getElementById('alerts-box').innerHTML=alerts;

  // Metrics
  const cls=rem<0?'r':rem<budTot*0.2?'a':'w';
  document.getElementById('metrics-grid').innerHTML=`
    <div class="metric"><div class="mlabel">Speso</div><div class="mval ${cls}">€${total.toFixed(0)}</div></div>
    <div class="metric"><div class="mlabel">Budget</div><div class="mval w">€${budTot.toFixed(0)}</div></div>
    <div class="metric"><div class="mlabel">Da incassare</div><div class="mval a">€${daInc.toFixed(0)}</div></div>
    <div class="metric"><div class="mlabel">Incassato</div><div class="mval g">€${incTot.toFixed(0)}</div></div>
  `;

  // Budget bars
  let bars='';
  S.categories.forEach(cat=>{
    const bud=cat.budget||0;if(!bud)return;
    const sp=catTot(cat.id,me);
    const p=Math.min(100,Math.round(sp/bud*100));
    bars+=`<div class="bbar">
      <div class="bbar-top">
        <span class="bbar-name">${cat.emoji} ${cat.name}</span>
        <span class="bbar-nums">€${sp.toFixed(0)} / €${bud}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${p}%;background:${barClr(p)}"></div></div>
    </div>`;
  });
  document.getElementById('budget-bars').innerHTML=bars||'<div class="empty"><div class="empty-txt">Nessuna categoria con budget</div></div>';

  const recent=me.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  document.getElementById('recent-list').innerHTML=recent.length
    ?recent.map(txRow).join('')
    :'<div class="empty"><div class="empty-ico">💸</div><div class="empty-txt">Nessuna spesa questo mese</div></div>';
}

function txRow(e){
  const cat=catById(e.catId);
  return`<div class="tx">
    <div class="tx-ico" style="background:${cat.color}20">${cat.emoji}</div>
    <div class="tx-info">
      <div class="tx-name">${e.desc}</div>
      <div class="tx-meta">${cat.name} · ${e.date.slice(5).replace('-','/')}</div>
    </div>
    <div class="tx-amt">−€${e.amount.toFixed(2)}</div>
    <button class="del-btn" data-action="del-exp" data-id="${e.id}">×</button>
  </div>`;
}

// ─── SPESE ───
function renderSpese(){
  const sorted=S.expenses.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('all-list').innerHTML=sorted.length
    ?sorted.map(txRow).join('')
    :'<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">Nessuna spesa ancora</div></div>';
}

function addExpense(desc,amount,catId,date){
  S.expenses.push({id:Date.now(),desc,amount,catId,date});
  save();renderHome();
}
function deleteExpense(id){
  showConfirm('Elimina spesa','Vuoi eliminare questa spesa?',()=>{
    S.expenses=S.expenses.filter(e=>e.id!==id);
    save();renderHome();renderSpese();
  });
}

// ─── BUDGET / CATEGORIE ───
function renderBudget(){
  const me=monthExp();
  document.getElementById('cat-list').innerHTML=S.categories.map(cat=>{
    const sp=catTot(cat.id,me);
    return`<div class="cat-row">
      <div class="cat-swatch" style="background:${cat.color}25">${cat.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="cat-name">${cat.name}</div>
        <div style="font-size:11px;color:var(--muted)">Budget €${cat.budget||0} · usati €${sp.toFixed(0)}</div>
      </div>
      <button class="edit-btn" data-action="edit-cat" data-id="${cat.id}">✏️</button>
      <button class="del-btn" style="margin-left:4px" data-action="del-cat" data-id="${cat.id}">×</button>
    </div>`;
  }).join('')||'<div class="empty"><div class="empty-txt">Nessuna categoria</div></div>';
}

function deleteCat(id){
  showConfirm('Elimina categoria','Le spese associate rimarranno ma senza categoria.',()=>{
    S.categories=S.categories.filter(c=>c.id!==id);
    save();renderBudget();
  });
}

// ─── ENTRATE ───
function renderEntrate(){
  const el=document.getElementById('prev-list');
  if(!S.projects.length){el.innerHTML='';return;}
  el.innerHTML=S.projects.map(p=>{
    const pays=p.payments||[];
    const inc=pays.reduce((s,pay)=>s+pay.amount,0);
    const pct=p.budget>0?Math.min(100,Math.round(inc/p.budget*100)):0;
    const daInc=Math.max(0,p.budget-inc);
    const clr=pct>=100?'#10b981':pct>=50?'#f59e0b':'#6366f1';
    const paysHTML=pays.map(pay=>`
      <div class="pay-row">
        <span class="pay-note">${pay.date.slice(5).replace('-','/')}${pay.note?' · '+pay.note:''}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pay-amt">+€${pay.amount.toFixed(2)}</span>
          <button class="del-btn" data-action="del-pay" data-id="${pay.id}">×</button>
        </div>
      </div>`).join('');
    return`<div class="prev-card">
      <div class="prev-head">
        <div><div class="prev-name">${p.name}</div><div class="prev-sub">Preventivo €${p.budget.toFixed(0)}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px;font-weight:700;color:${clr}">${pct}%</span>
          <button class="del-btn" data-action="del-proj" data-id="${p.id}">×</button>
        </div>
      </div>
      <div class="bar" style="margin-bottom:8px"><div class="bar-fill" style="width:${pct}%;background:${clr}"></div></div>
      <div class="prev-foot">
        <span class="prev-inc">↑ €${inc.toFixed(2)} incassati</span>
        <span class="prev-rem">${daInc>0?'Da inc. €'+daInc.toFixed(2):'✓ Saldato'}</span>
      </div>
      ${paysHTML}
      ${daInc>0?`<div class="incassa-wrap">
        <input type="number" placeholder="€" id="pay-amt-${p.id}">
        <input type="text" placeholder="Nota" id="pay-note-${p.id}">
        <button class="btn btn-sm btn-green" data-action="add-pay" data-proj="${p.id}">+ Incassa</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function addPayment(projId){
  const aEl=document.getElementById('pay-amt-'+projId);
  const nEl=document.getElementById('pay-note-'+projId);
  if(!aEl)return;
  const a=parseFloat(aEl.value);if(isNaN(a)||a<=0)return;
  const p=S.projects.find(x=>x.id===projId);if(!p)return;
  if(!p.payments)p.payments=[];
  p.payments.push({id:Date.now(),amount:a,note:(nEl?nEl.value.trim():''),date:new Date().toISOString().slice(0,10)});
  save();renderEntrate();renderHome();
}
function deletePayment(id){
  showConfirm('Elimina incasso','Vuoi eliminare questo incasso?',()=>{
    S.projects.forEach(p=>{if(p.payments)p.payments=p.payments.filter(pay=>pay.id!==id);});
    save();renderEntrate();renderHome();
  });
}
function addProject(){
  const name=document.getElementById('p-name').value.trim();
  const budget=parseFloat(document.getElementById('p-budget').value);
  if(!name||isNaN(budget))return;
  S.projects.push({id:Date.now(),name,budget,payments:[]});
  save();document.getElementById('p-name').value='';document.getElementById('p-budget').value='';
  renderEntrate();
}
function deleteProject(id){
  showConfirm('Elimina preventivo','Vuoi eliminare questo preventivo?',()=>{
    S.projects=S.projects.filter(p=>p.id!==id);
    save();renderEntrate();renderHome();
  });
}

// ─── ABBONAMENTI ───
function renderAbbonamenti(){
  const alerts=document.getElementById('sub-alerts');
  let alertsHTML='';

  const sorted=S.subscriptions.slice().sort((a,b)=>{
    return daysUntil(nextRenewal(a))-daysUntil(nextRenewal(b));
  });

  document.getElementById('sub-list').innerHTML=sorted.length?sorted.map(sub=>{
    const nr=nextRenewal(sub);
    const days=daysUntil(nr);
    let badge='', nextCls='';
    if(days<0){badge=`<span class="badge badge-due">In ritardo</span>`;nextCls='due';}
    else if(days<=5){badge=`<span class="badge badge-soon">Presto</span>`;nextCls='soon';}
    else{badge=`<span class="badge badge-paid">OK</span>`;}
    const cycleLabel={mensile:'/ mese',annuale:'/ anno',settimanale:'/ sett.'}[sub.cycle]||'';
    return`<div class="sub-card">
      <div class="sub-head">
        <div class="sub-ico" style="background:${sub.color||'#6366f1'}25">${sub.emoji||'↻'}</div>
        <div>
          <div class="sub-name">${sub.name} ${badge}</div>
          <div class="sub-cycle">${sub.cycle.charAt(0).toUpperCase()+sub.cycle.slice(1)}</div>
        </div>
        <div class="sub-right">
          <div class="sub-amt">€${sub.amount}</div>
          <div class="sub-next ${nextCls}">${days===0?'Oggi':days<0?Math.abs(days)+' gg fa':days+' gg'}</div>
        </div>
      </div>
      <div class="sub-actions">
        ${days<=3?`<button class="btn btn-sm btn-green" data-action="mark-sub-paid" data-id="${sub.id}">✓ Segna pagato</button>`:''}
        <button class="btn btn-sm btn-ghost" data-action="edit-sub" data-id="${sub.id}">Modifica</button>
        <button class="btn btn-sm" style="background:var(--red-dim);color:var(--red);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Sora',sans-serif" data-action="del-sub" data-id="${sub.id}">Elimina</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-ico">↻</div><div class="empty-txt">Nessun abbonamento ancora</div></div>`;

  // Total
  if(sorted.length){
    const monthly=S.subscriptions.reduce((s,sub)=>{
      const c=sub.cycle==='annuale'?sub.amount/12:sub.cycle==='settimanale'?sub.amount*4.33:sub.amount;
      return s+c;
    },0);
    alertsHTML=`<div class="alert-row info">↻ Totale abbonamenti: €${monthly.toFixed(0)}/mese · €${(monthly*12).toFixed(0)}/anno</div>`;
  }
  alerts.innerHTML=alertsHTML;
}

function markSubPaid(id){
  const sub=S.subscriptions.find(s=>s.id===id);if(!sub)return;
  const today=new Date().toISOString().slice(0,10);
  sub.startDate=today;
  S.expenses.push({id:Date.now(),desc:sub.name+' (abbonamento)',amount:sub.amount,catId:sub.catId||'cat-altro',date:today});
  save();renderAbbonamenti();renderHome();
}
function deleteSub(id){
  showConfirm('Elimina abbonamento','Vuoi eliminare questo abbonamento?',()=>{
    S.subscriptions=S.subscriptions.filter(s=>s.id!==id);
    save();renderAbbonamenti();
  });
}

// ─── SPLIT ───
// Logica dare/avere: per ogni spesa c'è un "payer" che ha anticipato i soldi.
// Ogni altra persona del gruppo deve la propria quota AL payer.
// Il saldo globale calcola: per ogni persona quanto ha anticipato vs quanto deve agli altri.

function calcBalances(){
  const balances={};
  const debts={};

  S.splits.forEach(sp=>{
    // Compatibilità con vecchi dati senza participants/payer
    if(!sp.participants||!sp.participants.length) return;
    if(!sp.payer) return;
    const payer=sp.payer;
    const n=sp.participants.length;
    if(n===0) return;
    const perPerson=sp.total/n;

    sp.participants.forEach(name=>{
      if(balances[name]===undefined) balances[name]=0;
    });

    sp.participants.forEach(name=>{
      if(name===payer){
        balances[name]+= perPerson*(n-1);
      } else {
        balances[name]-=perPerson;
        if(!debts[name]) debts[name]={};
        if(!debts[name][payer]) debts[name][payer]=0;
        debts[name][payer]+=perPerson;
      }
    });

    (sp.settlements||[]).forEach(s=>{
      if(balances[s.from]!==undefined) balances[s.from]+=s.amount;
      if(balances[s.to]!==undefined) balances[s.to]-=s.amount;
      if(debts[s.from]&&debts[s.from][s.to]!==undefined)
        debts[s.from][s.to]=Math.max(0, debts[s.from][s.to]-s.amount);
    });
  });
  return {balances, debts};
}

function renderSplit(){
  const {balances, debts}=calcBalances();
  const summaryEl=document.getElementById('split-summary');
  const splitListEl=document.getElementById('split-list');
  const names=Object.keys(balances);

  if(names.length){
    summaryEl.style.display='';
    const debtRows=Object.entries(debts).flatMap(([from,tos])=>
      Object.entries(tos).filter(([,amt])=>amt>0.01).map(([to,amt])=>
        `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="font-weight:600;color:var(--red)">${from==='Me'?'Tu':from}</span>
          <span style="color:var(--muted)">→</span>
          <span style="font-weight:600;color:var(--green)">${to==='Me'?'Tu':to}</span>
          <span style="margin-left:auto;font-weight:700">€${amt.toFixed(2)}</span>
        </div>`)
    ).join('');

    document.getElementById('split-summary-body').innerHTML=
      `<div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Saldo netto</div>`+
      names.map(name=>{
        const fc=friendColor(name);
        const bal=balances[name];
        const isMe=name==='Me';
        let label,clr;
        if(Math.abs(bal)<0.01){label='✓ In paro';clr='var(--muted)';}
        else if(bal>0){label=isMe?`Devi ricevere €${bal.toFixed(2)}`:`Deve ricevere €${bal.toFixed(2)}`;clr='var(--green)';}
        else{label=isMe?`Devi €${Math.abs(bal).toFixed(2)}`:`Deve €${Math.abs(bal).toFixed(2)}`;clr='var(--red)';}
        return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:50%;background:${fc}25;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${fc}">${isMe?'👤':initials(name)}</div>
          <span style="flex:1;font-size:14px;font-weight:600">${isMe?'Tu':name}</span>
          <span style="font-size:13px;font-weight:700;color:${clr}">${label}</span>
        </div>`;
      }).join('')+
      (debtRows?`<div style="font-size:11px;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">Chi deve a chi</div>${debtRows}`:'');
  } else {
    summaryEl.style.display='none';
  }

  if(!S.splits.length){
    splitListEl.innerHTML='<div class="empty"><div class="empty-ico">👥</div><div class="empty-txt">Nessuna spesa condivisa ancora</div></div>';
    return;
  }

  splitListEl.innerHTML=S.splits.map(sp=>{
    // Compatibilità con vecchi record
    const participants=sp.participants||[];
    const payer=sp.payer||'?';
    const n=participants.length||1;
    const perPerson=(sp.total/n).toFixed(2);
    const pc=friendColor(payer);
    const payerLabel=payer==='Me'?'Tu (Me)':payer;

    const memberRows=participants.filter(name=>name!==payer).map(name=>{
      const myDebt=(debts[name]&&debts[name][payer])||0;
      const fc2=friendColor(name);
      const isPaid=myDebt<0.01;
      const nameLabel=name==='Me'?'Tu':name;
      return`<div class="friend-row">
        <div class="friend-avatar" style="background:${fc2}25;color:${fc2}">${name==='Me'?'👤':initials(name)}</div>
        <span class="friend-name">${nameLabel}</span>
        <span class="friend-share" style="color:${isPaid?'var(--green)':'var(--amber)'}">€${parseFloat(perPerson).toFixed(2)}</span>
        <button class="pay-toggle" data-action="settle-debt" data-split="${sp.id}" data-id="${name}"
          style="background:${isPaid?'var(--green-dim)':'var(--red-dim)'};color:${isPaid?'var(--green)':'var(--red)'}">
          ${isPaid?'✓ Saldato':'Segna saldato'}
        </button>
      </div>`;
    }).join('');

    return`<div class="split-card">
      <div class="split-head">
        <div>
          <div class="split-name">${sp.name}</div>
          <div class="split-tot">€${sp.total.toFixed(2)} · ${sp.date?sp.date.slice(5).replace('-','/'):'—'} · ${n} persone</div>
        </div>
        <button class="del-btn" data-action="del-split" data-id="${sp.id}">×</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px">
        <div style="width:30px;height:30px;border-radius:50%;background:${pc}25;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${pc}">${payer==='Me'?'👤':initials(payer)}</div>
        <div>
          <div style="font-size:11px;color:var(--muted)">Ha pagato</div>
          <div style="font-size:14px;font-weight:700">${payerLabel} · €${sp.total.toFixed(2)}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:11px;color:var(--muted)">Quota ciascuno</div>
          <div style="font-size:14px;font-weight:700;color:var(--accent2)">€${perPerson}</div>
        </div>
      </div>
      ${memberRows}
    </div>`;
  }).join('');
}

function settleDebt(splitId, fromName){
  const sp=S.splits.find(s=>s.id===splitId);if(!sp)return;
  if(!sp.settlements) sp.settlements=[];
  const perPerson=sp.total/sp.participants.length;
  // Rimuovi eventuale settlement già esistente (toggle)
  const existing=sp.settlements.findIndex(s=>s.from===fromName&&s.to===sp.payer);
  if(existing>=0){ sp.settlements.splice(existing,1); }
  else { sp.settlements.push({from:fromName,to:sp.payer,amount:perPerson}); }
  save();renderSplit();
}

function deleteSplit(id){
  showConfirm('Elimina spesa condivisa','Vuoi eliminarla?',()=>{
    S.splits=S.splits.filter(s=>s.id!==id);
    save();renderSplit();
  });
}

// ─── SHEET SYSTEM ───
let currentSheet='';
let editingId=null;
let _selectedColor=PALETTE[5];
let _selectedEmoji='📦';
let _splitFriends=[];

function openSheet(type, id=null){
  currentSheet=type; editingId=id;
  const inner=document.getElementById('sheet-inner');
  inner.innerHTML='<div class="sheet-pill"></div>'+buildSheet(type,id);
  document.getElementById('sheet').classList.add('open');
  // init pickers after render
  if(type==='new-cat'||type==='edit-cat') initCatPickers(id);
  if(type==='new-split') initSplitFriends();
}

function buildSheet(type, id){
  if(type==='new-expense') return buildExpenseSheet('spesa');
  if(type==='new-cat') return buildCatSheet(null);
  if(type==='edit-cat') return buildCatSheet(S.categories.find(c=>c.id===id));
  if(type==='new-sub') return buildSubSheet(null);
  if(type==='edit-sub') return buildSubSheet(S.subscriptions.find(s=>s.id===Number(id)));
  if(type==='new-split') return buildSplitSheet();
  return '';
}

function submitExpense(){
  const desc=document.getElementById('m-desc').value.trim();
  const amount=parseFloat(document.getElementById('m-amt').value);
  const catId=document.getElementById('m-cat').value;
  const date=document.getElementById('m-date').value||new Date().toISOString().slice(0,10);
  if(!desc||isNaN(amount)||amount<=0||!catId)return;
  addExpense(desc,amount,catId,date);
  closeSheet();
}

  const switcher=`<div style="display:flex;background:rgba(255,255,255,0.06);border-radius:12px;padding:4px;gap:4px;margin-bottom:22px;margin-top:4px">
    ${tabs.map(t=>`<button onclick="switchSheetTab('${t}')"
      style="flex:1;padding:9px 4px;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;background:${tab===t?'var(--accent)':'transparent'};color:${tab===t?'#fff':'var(--muted)'}"
      id="stab-${t}">${labels[t]}</button>`).join('')}
  </div>`;

  const spesaForm=`<div id="sform-spesa" style="display:${tab==='spesa'?'block':'none'}">
    <div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="m-desc" placeholder="es. Cena fuori"></div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Importo €</label><input type="number" id="m-amt" placeholder="0.00" step="0.01"></div>
      <div class="form-group"><label class="form-label">Data</label><input type="date" id="m-date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="form-group"><label class="form-label">Categoria</label><select id="m-cat">${cats}</select></div>
    <button class="btn btn-accent" onclick="submitExpense()" style="margin-bottom:10px">Aggiungi spesa</button>
    <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>
  </div>`;

  const prevTitles=S.projects.map(p=>`<option value="${p.id}">${p.name} (€${p.budget})</option>`).join('');
  const entrataForm=`<div id="sform-entrata" style="display:${tab==='entrata'?'block':'none'}">
    <div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="e-desc" placeholder="es. Pagamento cliente X"></div>
    <div class="form-group"><label class="form-label">Importo €</label><input type="number" id="e-amt" placeholder="0.00" step="0.01"></div>
    <div class="form-group"><label class="form-label">Preventivo collegato (opz.)</label>
      <select id="e-proj"><option value="">Nessuno</option>${prevTitles}</select>
    </div>
    <button class="btn btn-green" onclick="submitEntrata()" style="margin-bottom:10px">Registra entrata</button>
    <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>
  </div>`;

  const emojiOpts=EMOJIS.slice(0,15).map(e=>`<div class="emoji-opt" onclick="selectSubEmoji('${e}')">${e}</div>`).join('');
  const abbonForm=`<div id="sform-abbonamento" style="display:${tab==='abbonamento'?'block':'none'}">
    <div class="form-group"><label class="form-label">Nome</label><input type="text" id="sub-name" placeholder="es. Spotify"></div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Costo €</label><input type="number" id="sub-amt" placeholder="9.99" step="0.01"></div>
      <div class="form-group"><label class="form-label">Ciclo</label>
        <select id="sub-cycle">
          <option value="mensile">Mensile</option>
          <option value="annuale">Annuale</option>
          <option value="settimanale">Settimanale</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="form-group"><label class="form-label">Prossimo rinnovo</label><input type="date" id="sub-start" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label class="form-label">Categoria</label><select id="sub-cat">${cats}</select></div>

    <div class="form-group"><label class="form-label">Emoji</label><div class="emoji-grid" id="sub-emoji-grid">${emojiOpts}</div></div>
    <button class="btn btn-accent" onclick="submitSub()" style="margin-bottom:10px">Aggiungi abbonamento</button>
    <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>
  </div>`;

  return switcher+spesaForm+entrataForm+abbonForm;
}

function switchSheetTab(tab){
  ['spesa','entrata','abbonamento'].forEach(t=>{
    const form=document.getElementById('sform-'+t);
    const btn=document.getElementById('stab-'+t);
    if(form) form.style.display=t===tab?'block':'none';
    if(btn){
      btn.style.background=t===tab?'var(--accent)':'transparent';
      btn.style.color=t===tab?'#fff':'var(--muted)';
    }
  });
}

function submitEntrata(){
  const desc=document.getElementById('e-desc').value.trim();
  const amount=parseFloat(document.getElementById('e-amt').value);
  const projId=document.getElementById('e-proj').value;
  if(!desc||isNaN(amount)||amount<=0) return;
  if(projId){
    const p=S.projects.find(x=>x.id===Number(projId));
    if(p){
      if(!p.payments) p.payments=[];
      p.payments.push({id:Date.now(),amount,note:desc,date:new Date().toISOString().slice(0,10)});
    }
  } else {
    // Registra come entrata generica — aggiunge un progetto "one-off" se non collegato
    S.projects.push({id:Date.now(),name:desc,budget:amount,payments:[{id:Date.now()+1,amount,note:desc,date:new Date().toISOString().slice(0,10)}]});
  }
  save();closeSheet();renderHome();
}

function buildCatSheet(cat){
  const isEdit=!!cat;
  if(cat){_selectedColor=cat.color;_selectedEmoji=cat.emoji;}
  else{_selectedColor=PALETTE[Math.floor(Math.random()*PALETTE.length)];_selectedEmoji=EMOJIS[0];}

  const colorOpts=PALETTE.map(c=>`<div class="color-opt${c===_selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
  const emojiOpts=EMOJIS.map(e=>`<div class="emoji-opt${e===_selectedEmoji?' selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');

  return`<div class="sheet-title">${isEdit?'Modifica categoria':'Nuova categoria'}</div>
  <div class="form-group"><label class="form-label">Nome</label><input type="text" id="cat-name" placeholder="es. Palestra" value="${isEdit?cat.name:''}"></div>
  <div class="form-group"><label class="form-label">Budget mensile €</label><input type="number" id="cat-budget" placeholder="200" value="${isEdit&&cat.budget?cat.budget:''}"></div>
  <div class="form-group">
    <label class="form-label">Colore</label>
    <div class="color-grid" id="color-grid">${colorOpts}</div>
  </div>
  <div class="form-group">
    <label class="form-label">Emoji</label>
    <div class="emoji-grid" id="emoji-grid">${emojiOpts}</div>
  </div>
  <button class="btn btn-accent" onclick="submitCat()" style="margin-bottom:10px">${isEdit?'Salva modifiche':'Crea categoria'}</button>
  <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>`;
}

function initCatPickers(id){}

function selectColor(c){
  _selectedColor=c;
  document.querySelectorAll('.color-opt').forEach(el=>{el.classList.toggle('selected',el.style.background===c||el.style.backgroundColor===c);});
}
function selectEmoji(e){
  _selectedEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e));
}

function submitCat(){
  const name=document.getElementById('cat-name').value.trim();
  const budget=parseFloat(document.getElementById('cat-budget').value)||0;
  if(!name)return;
  if(editingId){
    const cat=S.categories.find(c=>c.id===editingId);
    if(cat){cat.name=name;cat.budget=budget;cat.color=_selectedColor;cat.emoji=_selectedEmoji;}
  } else {
    S.categories.push({id:'cat-'+Date.now(),name,emoji:_selectedEmoji,color:_selectedColor,budget});
  }
  save();closeSheet();renderBudget();renderHome();
}

function buildSubSheet(sub){
  const isEdit=!!sub;
  const cats=S.categories.map(c=>`<option value="${c.id}"${isEdit&&sub.catId===c.id?' selected':''}>${c.emoji} ${c.name}</option>`).join('');
  const emojiOpts=EMOJIS.map(e=>`<div class="emoji-opt${isEdit&&sub.emoji===e?' selected':''}" onclick="selectSubEmoji('${e}')">${e}</div>`).join('');
  if(isEdit) _selectedEmoji=sub.emoji||'↻';
  return`<div class="sheet-title">${isEdit?'Modifica abbonamento':'Nuovo abbonamento'}</div>
  <div class="form-group"><label class="form-label">Nome</label><input type="text" id="sub-name" placeholder="es. Spotify" value="${isEdit?sub.name:''}"></div>
  <div class="row2">
    <div class="form-group"><label class="form-label">Costo €</label><input type="number" id="sub-amt" placeholder="9.99" step="0.01" value="${isEdit?sub.amount:''}"></div>
    <div class="form-group"><label class="form-label">Ciclo</label>
      <select id="sub-cycle">
        <option value="mensile"${!isEdit||sub.cycle==='mensile'?' selected':''}>Mensile</option>
        <option value="annuale"${isEdit&&sub.cycle==='annuale'?' selected':''}>Annuale</option>
        <option value="settimanale"${isEdit&&sub.cycle==='settimanale'?' selected':''}>Settimanale</option>
      </select>
    </div>
  </div>
  <div class="form-group"><label class="form-label">Data primo rinnovo</label><input type="date" id="sub-start" value="${isEdit?sub.startDate:new Date().toISOString().slice(0,10)}"></div>
  <div class="form-group"><label class="form-label">Categoria spesa</label><select id="sub-cat">${cats}</select></div>
  <div class="form-group"><label class="form-label">Emoji</label><div class="emoji-grid" id="sub-emoji-grid">${emojiOpts}</div></div>
  <button class="btn btn-accent" onclick="submitSub()" style="margin-bottom:10px">${isEdit?'Salva':'Crea abbonamento'}</button>
  <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>`;
}
function selectSubEmoji(e){
  _selectedEmoji=e;
  document.querySelectorAll('#sub-emoji-grid .emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e));
}
function submitSub(){
  const name=document.getElementById('sub-name').value.trim();
  const amount=parseFloat(document.getElementById('sub-amt').value);
  const cycle=document.getElementById('sub-cycle').value;
  const startDate=document.getElementById('sub-start').value;
  const catId=document.getElementById('sub-cat').value;
  if(!name||isNaN(amount))return;
  if(editingId){
    const sub=S.subscriptions.find(s=>s.id===Number(editingId));
    if(sub){sub.name=name;sub.amount=amount;sub.cycle=cycle;sub.startDate=startDate;sub.catId=catId;sub.emoji=_selectedEmoji;}
  } else {
    S.subscriptions.push({id:Date.now(),name,amount,cycle,startDate,catId,emoji:_selectedEmoji});
  }
  save();closeSheet();renderAbbonamenti();renderHome();
}

function buildSplitSheet(){
  const allPeople=['Me',...S.friends];
  if(!_splitFriends||!_splitFriends.length) _splitFriends=['Me'];
  const friendTags=allPeople.map(f=>`<div class="friend-tag${_splitFriends.includes(f)?' selected':''}" data-fname="${f}" onclick="toggleFriendTag('${f}')">${f==='Me'?'👤 Me':f}</div>`).join('');
  const payerOpts=allPeople.map(f=>`<option value="${f}">${f==='Me'?'👤 Me (ho pagato io)':f}</option>`).join('');
  return`<div class="sheet-title">Nuova spesa condivisa</div>
  <div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="sp-name" placeholder="es. Cena di gruppo"></div>
  <div class="row2">
    <div class="form-group"><label class="form-label">Totale €</label><input type="number" id="sp-tot" placeholder="120" step="0.01" oninput="updateSplitPreview()"></div>
    <div class="form-group"><label class="form-label">Data</label><input type="date" id="sp-date" value="${new Date().toISOString().slice(0,10)}"></div>
  </div>
  <div class="form-group">
    <label class="form-label">Chi ha pagato?</label>
    <select id="sp-payer" onchange="updateSplitPreview()">${payerOpts}</select>
  </div>
  <div class="form-group">
    <label class="form-label">Partecipanti (tocca per selezionare)</label>
    <div id="friend-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${friendTags}</div>
    <div style="display:flex;gap:8px">
      <input type="text" id="new-friend-name" placeholder="Aggiungi amico..." style="flex:1">
      <button class="btn btn-sm btn-accent" onclick="addFriendToSplit()">+</button>
    </div>
  </div>
  <div id="split-preview" style="margin-top:4px"></div>
  <button class="btn btn-accent" onclick="submitSplit()" style="margin-bottom:10px;margin-top:12px">Crea spesa condivisa</button>
  <button class="btn btn-ghost" onclick="closeSheet()">Annulla</button>`;
}

function initSplitFriends(){ _splitFriends=['Me']; }

function toggleFriendTag(name){
  const idx=_splitFriends.indexOf(name);
  if(idx>=0) _splitFriends.splice(idx,1);
  else _splitFriends.push(name);
  document.querySelectorAll('[data-fname]').forEach(el=>{
    el.classList.toggle('selected', _splitFriends.includes(el.dataset.fname));
  });
  updateSplitPreview();
}

function addFriendToSplit(){
  const input=document.getElementById('new-friend-name');
  const name=input.value.trim(); if(!name) return;
  if(!S.friends.includes(name)){ S.friends.push(name); save(); }
  if(!_splitFriends.includes(name)) _splitFriends.push(name);
  input.value='';
  const payerSel=document.getElementById('sp-payer');
  if(payerSel&&![...payerSel.options].find(o=>o.value===name)){
    const opt=document.createElement('option'); opt.value=name; opt.textContent=name;
    payerSel.appendChild(opt);
  }
  const tagsEl=document.getElementById('friend-tags');
  const newTag=document.createElement('div');
  newTag.className='friend-tag selected';
  newTag.dataset.fname=name;
  newTag.textContent=name;
  newTag.onclick=()=>toggleFriendTag(name);
  tagsEl.appendChild(newTag);
  updateSplitPreview();
}

function updateSplitPreview(){
  const totEl=document.getElementById('sp-tot'); if(!totEl) return;
  const tot=parseFloat(totEl.value)||0;
  const el=document.getElementById('split-preview'); if(!el) return;
  if(!_splitFriends.length||!tot){el.innerHTML='';return;}
  const share=(tot/_splitFriends.length).toFixed(2);
  const payerEl=document.getElementById('sp-payer');
  const payer=payerEl?payerEl.value:'?';
  const payerLabel=payer==='Me'?'Tu':payer;
  el.innerHTML=`<div class="alert-row info">${payerLabel} ha anticipato €${tot.toFixed(2)} · €${share} a testa per ${_splitFriends.length} persone</div>`;
}

function submitSplit(){
  const name=document.getElementById('sp-name').value.trim();
  const total=parseFloat(document.getElementById('sp-tot').value);
  const date=document.getElementById('sp-date').value;
  const payer=document.getElementById('sp-payer').value;
  if(!name||isNaN(total)||total<=0||_splitFriends.length<2) return;
  const participants=[..._splitFriends];
  if(!participants.includes(payer)) participants.push(payer);
  S.splits.push({id:Date.now(),name,total,date,payer,participants,settlements:[]});
  save(); closeSheet(); renderSplit();
}

function closeSheet(e){
  if(!e||e.target===document.getElementById('sheet'))
    document.getElementById('sheet').classList.remove('open');
}

renderHome();
</script>
